name: pulumi-stacks

on:
  workflow_call:
    inputs:
      command:
        description: The Pulumi command to run across the stacks — preview or up.
        required: true
        type: string
      environment:
        description: Target environment name (e.g. dev).
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      PULUMI_CONFIG_PASSPHRASE:
        required: true
      AUTH0_DOMAIN:
        required: true
      AUTH0_CLIENT_ID:
        required: true
      AUTH0_CLIENT_SECRET:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  stacks:
    name: Pulumi stacks — ${{ inputs.command }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      ENVIRONMENT: ${{ inputs.environment }}
      PULUMI_STATE_ACCOUNT: fmis${{ inputs.environment }}tfstate
      PULUMI_STATE_CONTAINER: pulumi-state
      RESOURCE_GROUP: fmis-${{ inputs.environment }}-infra
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
      AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
      AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
      AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bootstrap the Pulumi state backend
        run: ./infra/scripts/bootstrap-state.sh

      - name: Set up Pulumi
        uses: pulumi/actions@v7
        with:
          pulumi-version: 3.247.0

      - name: Log in to the Pulumi state backend
        run: pulumi login "azblob://${PULUMI_STATE_CONTAINER}?storage_account=${PULUMI_STATE_ACCOUNT}"

      - name: Compute the deployer IP and principal
        run: |
          echo "DEPLOYER_IP=$(curl -s ifconfig.me)" >> "$GITHUB_ENV"
          echo "DEPLOY_PRINCIPAL_OBJECT_ID=$(az ad sp show --id ${{ secrets.AZURE_CLIENT_ID }} --query id -o tsv)" >> "$GITHUB_ENV"

      - name: Build the frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Auth — pulumi ${{ inputs.command }}
        working-directory: infra/auth
        run: |
          pulumi stack select "${{ inputs.environment }}" || pulumi stack init "${{ inputs.environment }}"
          pulumi ${{ inputs.command == 'up' && 'up --yes' || 'preview' }}

      - name: Persistence — pulumi ${{ inputs.command }}
        working-directory: infra/persistence
        run: |
          pulumi stack select "${{ inputs.environment }}" || pulumi stack init "${{ inputs.environment }}"
          pulumi ${{ inputs.command == 'up' && 'up --yes' || 'preview' }}

      - name: Identity — pulumi ${{ inputs.command }}
        working-directory: infra/identity
        run: |
          pulumi stack select "${{ inputs.environment }}" || pulumi stack init "${{ inputs.environment }}"
          pulumi ${{ inputs.command == 'up' && 'up --yes' || 'preview' }}

      - name: Log in to the container registry
        if: ${{ inputs.command == 'up' }}
        run: az acr login --name fmis${{ inputs.environment }}acr

      - name: Application — pulumi ${{ inputs.command }}
        working-directory: infra/application
        run: |
          pulumi stack select "${{ inputs.environment }}" || pulumi stack init "${{ inputs.environment }}"
          pulumi ${{ inputs.command == 'up' && 'up --yes' || 'preview' }}
