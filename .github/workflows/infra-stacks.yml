name: infra-stacks

on:
  workflow_call:
    inputs:
      command:
        description: The Pulumi command to run across the stacks — preview or up.
        required: true
        type: string
      environment:
        description: Target environment name (e.g. dev).
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      PULUMI_CONFIG_PASSPHRASE:
        required: true
      AUTH0_DOMAIN:
        required: true
      AUTH0_CLIENT_ID:
        required: true
      AUTH0_CLIENT_SECRET:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  stacks:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      ENVIRONMENT: ${{ inputs.environment }}
      PULUMI_STATE_ACCOUNT: fmis${{ inputs.environment }}tfstate
      PULUMI_STATE_CONTAINER: pulumi-state
      RESOURCE_GROUP: fmis-${{ inputs.environment }}-infra
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bootstrap Pulumi state backend
        run: ./infra/scripts/bootstrap-state.sh

      - uses: pulumi/actions@v7
        with:
          pulumi-version: 3.247.0

      - name: Pulumi login (azblob)
        run: pulumi login "azblob://${PULUMI_STATE_CONTAINER}?storage_account=${PULUMI_STATE_ACCOUNT}"

      - name: Compute deploy inputs
        run: |
          echo "DEPLOYER_IP=$(curl -s ifconfig.me)" >> "$GITHUB_ENV"
          echo "DEPLOY_PRINCIPAL_OBJECT_ID=$(az ad sp show --id ${{ secrets.AZURE_CLIENT_ID }} --query id -o tsv)" >> "$GITHUB_ENV"

      - name: Pulumi ${{ inputs.command }} across stacks
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          for stack in auth persistence identity; do
            echo "::group::${stack} ${{ inputs.command }}"
            cd "infra/${stack}"
            pulumi stack select "${{ inputs.environment }}" || pulumi stack init "${{ inputs.environment }}"
            if [ "${{ inputs.command }}" = "up" ]; then
              pulumi up --yes
            else
              pulumi preview
            fi
            cd - > /dev/null
            echo "::endgroup::"
          done
