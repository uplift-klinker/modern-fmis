name: Pulumi stacks
description: Run a Pulumi command across the infra stacks (auth, persistence, identity) in dependency order.

inputs:
  command:
    description: The Pulumi command to run per stack — preview or up.
    required: true
  environment:
    description: Target environment name (drives the stack name + fmis-<env>-* naming).
    required: true
  azure-client-id:
    required: true
  azure-tenant-id:
    required: true
  azure-subscription-id:
    required: true
  pulumi-passphrase:
    required: true
  auth0-domain:
    required: true
  auth0-client-id:
    required: true
  auth0-client-secret:
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - uses: azure/login@v3
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}

    - name: Bootstrap Pulumi state backend
      shell: bash
      env:
        ENVIRONMENT: ${{ inputs.environment }}
        PULUMI_STATE_ACCOUNT: fmis${{ inputs.environment }}tfstate
        PULUMI_STATE_CONTAINER: pulumi-state
        RESOURCE_GROUP: fmis-${{ inputs.environment }}-infra
      run: ./infra/scripts/bootstrap-state.sh

    - uses: pulumi/actions@v7
      with:
        pulumi-version: 3.247.0

    - name: Pulumi login (azblob)
      shell: bash
      run: pulumi login "azblob://pulumi-state?storage_account=fmis${{ inputs.environment }}tfstate"

    - name: Compute deploy inputs
      shell: bash
      run: |
        echo "DEPLOYER_IP=$(curl -s ifconfig.me)" >> "$GITHUB_ENV"
        echo "DEPLOY_PRINCIPAL_OBJECT_ID=$(az ad sp show --id ${{ inputs.azure-client-id }} --query id -o tsv)" >> "$GITHUB_ENV"

    - name: Pulumi ${{ inputs.command }} across stacks
      shell: bash
      env:
        PULUMI_CONFIG_PASSPHRASE: ${{ inputs.pulumi-passphrase }}
        AUTH0_DOMAIN: ${{ inputs.auth0-domain }}
        AUTH0_CLIENT_ID: ${{ inputs.auth0-client-id }}
        AUTH0_CLIENT_SECRET: ${{ inputs.auth0-client-secret }}
        AZURE_TENANT_ID: ${{ inputs.azure-tenant-id }}
      run: |
        for stack in auth persistence identity; do
          echo "::group::${stack} ${{ inputs.command }}"
          cd "infra/${stack}"
          pulumi stack select "${{ inputs.environment }}" || pulumi stack init "${{ inputs.environment }}"
          if [ "${{ inputs.command }}" = "up" ]; then
            pulumi up --yes
          else
            pulumi preview
          fi
          cd - > /dev/null
          echo "::endgroup::"
        done
